      confidence: 0.8
      keywords: *shared_keywords_imei
#ip_address_recognizer
ip_address_recognizer:
  custom_ip_address:
    - name: "IPv4 in CIDR notation"
      regex: '\b((25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.){3}(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])/(3[0-2]|[1-2]?[0-9])\b'
      confidence: 0.7
