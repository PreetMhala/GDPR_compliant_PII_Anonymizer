      regex: '\b3[47][0-9]{13}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "BCGlobal"
      regex: '\b(6541|6556)[0-9]{12}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Carte Blanche Card"
      regex: '\b389[0-9]{11}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

