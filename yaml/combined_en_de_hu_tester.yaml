      regex: '(?i)([a-z0-9!#$%&''*+\/=?^_`{|.}~-]+@(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?)'
      confidence: 0.8
      keywords: *shared_keywords_email
    - name: "Email Address (Extended)"
      regex: '(?i)([a-z0-9!#$%&''*+/?^_`{|}~-]+(?:\.[a-z0-9!#$%&''*+/?^_`{|}~-]+)*)(\+[\w-]*)?@([a-z0-9-]+\.[a-z]{2,})(?:\.[a-z]{2,})?'
      confidence: 0.9
      keywords: *shared_keywords_email

