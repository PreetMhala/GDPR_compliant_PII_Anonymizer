    - name: "IPv6 in CIDR notation"
      regex: '\b((?:[A-Fa-f0-9]{1,4}:){1,7}[A-Fa-f0-9]{1,4}|::(?:[A-Fa-f0-9]{1,4}:){0,6}[A-Fa-f0-9]{1,4})/(12[0-8]|[1-9]?[0-9])\b'
      confidence: 0.6
