    - name: "Insta Payment Card"
      regex: '\b63[7-9][0-9]{13}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "JCB Card"
      regex: '\b(?:2131|1800|35\d{3})\d{11}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Korean Local Card"
      regex: '\b9[0-9]{15}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Maestro Card"
      regex: '\b(5018|5020|5038|6304|6759|6761|6763)[0-9]{8,15}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "MasterCard"
      regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|[25][1-7][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|(?:2131|1800|35\d{3})\d{11})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Union Pay Card"
      regex: '\b(62[0-9]{14,17})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Visa Card"
      regex: '\b4[0-9]{12}(?:[0-9]{3})?\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Visa Master Card"
      regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "All Credit Cards (weak)"
