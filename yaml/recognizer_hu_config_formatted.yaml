passport_list:
  passports:
    INDIAN:
      - name: "Indian Passport"
        regex: '((?i)\b[A-Z][1-9][0-9]{6}[1-9]\b)'
        confidence: 0.3
        keyword: *passport_context

    US:
      - name: "US Passport (very weak)"
        regex: "(?i)(\b[0-9]{9}\b)"
        confidence: 0.1
        keyword: *passport_context
      - name: "US Passport Next Generation (very weak)"
        regex: '(?i)(\b[A-Z][0-9]{8}\b)'
        confidence: 0.4
        keyword: *passport_context

    ITALY:
      - name: "Italian Passport (very weak)"
        regex: '(?i)\b[A-Z]{2}\d{7}\b'
        confidence: 0.5
        keyword: *passport_context

    CANADA:
      - name: "Canada Passport ID"
        regex: '(?i)\b[\w]{2}[\d]{6}\b'
        confidence: 0.5
        keyword: *passport_context

    FRANCE:
      - name: "France Passport"
        regex: '(?i)\b\d{2}11\d{5}\b'
        confidence: 0.3
        keyword: *passport_context

    GERMAN:
      - name: "German Passport"
        regex: '(?i)\b[cfghjk]\d{3}\w{5}\d\b'
        confidence: 0.7
        keyword: *passport_context
      - name: "German Passport (Weak)"
        regex: '\b(?i:(([cfghjk] ?[0-9cfghjklmnprtvwxyzo]{8}[0-9]?)[d]?))\b'
        confidence: 0.5
        keyword: *passport_context

    SWEDEN:
      - name: "Sweden Passport"
        regex: '\b\d{8}\b'
        confidence: 0.3
        keyword: *passport_context

    UK:
      - name: "UK Passport"
        regex: '\b\d{9}\b'
        confidence: 0.3
        keyword: *passport_context

    AUSTRIA:
      - name: "Austria Passport"
        regex: 'AP[0-9]{6}|U[0-9]{7}'
        confidence: 0.3
        keyword: *passport_context

    RUSSIAN:
      - name: "Russian Passport"
        regex: '[0-9]{2}[\s\-]?[0-9]{7,8}'
        confidence: 0.3
        keyword: *passport_context

    HUNGARY:
      - name: "Hungarian Passport"
        regex: '\b[A-Z]{2}\d{6,7}\b'
        confidence: 0.8
        keyword: *passport_context


