pattern_custom:
  patterns:
  # Location based patterns
    - name: STREET
      regex: 
        (?i)(?<!\d+\s>)(?:([\w\d.\-]+\s?){,2}(?:utca|út|körút|krt\.|tér|sétány|köz|park|sor|dűlő|liget|lejtő|rakpart|part|domb|udvar|útja)(\s\d+)?)(?=[\W])
      confidence: 0.5
      keywords:
        - utca               # street, Straße, calle, οδός
        - cím                # address, Adresse, dirección, διεύθυνση
        - hely               # location, Ort, lugar, τόπος
        - tér                # place, Platz, plaza, πλατεία
        - város              # city, town
        - falu               # village
        - kerület            # district
        - sétány             # promenade, walkway  # (Hungarian-specific addition)
        - körút              # boulevard, ring road  # (Hungarian-specific addition)
        - park               # park  # (Hungarian-specific addition)
        - köz                # alley, passage  # (Hungarian-specific addition)
        - sor                # row, line  # (Hungarian-specific addition)
        - dűlő               # dirt road, land division  # (Hungarian-specific addition)
        - liget              # grove, small park  # (Hungarian-specific addition)
        - lejtő              # slope, hill  # (Hungarian-specific addition)
        - rakpart            # quay, embankment  # (Hungarian-specific addition)
        - part               # shore, bank  # (Hungarian-specific addition)
        - domb               # hill  # (Hungarian-specific addition)
        - udvar              # court, yard  # (Hungarian-specific addition)
        - út                 # road, way  # (Hungarian-specific addition)
        - útja               # "his/her road" (suffix form of "út")  # (Hungarian-specific addition)



    - name: STATE
      regex: 
        (?i)\b(?:[A-ZÖÜÓŐÚÉÁŰÍa-zöüóőúéáűí]+(?:\smegye)?|Közép-Magyarország|Nyugat-Dunántúl|Dél-Alföld|Észak-Magyarország)\b
      confidence: 0.2
      keywords:
        - város             # city, Stadt, ciudad, πόλη
        - állam             # state, Bundesstaat, estado, πολιτεία
        - megye             # (Hungarian-specific addition for "county")
        - régió             # (Hungarian-specific addition for "region")
        - irányítószám      # zip code, Postleitzahl, código postal, ταχυδρομικός κώδικας
        - cím               # address, Adresse, dirección, διεύθυνση

    - name: STREET
      regex: '(?i)(?<!\d\s>)([\d\w.!:,/-]+\s){1,2}(?:utca|út|tér|körút|köz|sétány|park|lejtő|liget|dűlő|rakpart|fasor|sor|köz|udvar|árok|körönd)\.?(?=\s|,|$)'
      confidence: 0.3
      keywords:
        - utca          # street, Straße, calle, οδός
        - cím           # address, Adresse, dirección, διεύθυνση
        - hely          # location, Ort, lugar, τόπος
        - tér           # square, Platz, plaza, πλατεία
        - város         # city, Stadt, ciudad, πόλη
        - falu          # village, Dorf
        - kerület       # district, Bezirk
        - köz           # (Hungarian-specific, alley or narrow street) — new term
        - körút         # boulevard, boulevard, körút — new term
        - út            # road, road, carretera — new term
        - sétány        # promenade / walkway — new term
        - park          # park — translated from "park"
        - liget         # grove — new Hungarian keyword (used for park-like names)
        - lejtő         # slope — new Hungarian keyword
        - rakpart       # embankment — new Hungarian keyword
        - dűlő          # track/field road — new Hungarian keyword
        - fasor         # tree-lined avenue — new Hungarian keyword
        - sor           # row (street) — new Hungarian keyword
        - udvar         # yard (used in addresses) — new Hungarian keyword
        - körönd        # circus/round plaza — new Hungarian keyword
        - árok          # ditch (used in street names like "Árok utca") — new Hungarian keyword


    - name: STATE
      regex: '(?:^|(?<=\W))(Budapest|Baranya|Bács-Kiskun|Békés|Borsod-Abaúj-Zemplén|Csongrád-Csanád|Fejér|Győr-Moson-Sopron|Hajdú-Bihar|Heves|Jász-Nagykun-Szolnok|Komárom-Esztergom|Nógrád|Pest|Somogy|Szabolcs-Szatmár-Bereg|Tolna|Vas|Veszprém|Zala)(?:(?=\W)|$)'
      confidence: 0.5
      keywords:
        - szövetségi állam     # federal state, Bundesland
        - régió                # region, región, περιοχή
        - megye                # (Hungarian-specific) — new term
        - térség               # (Hungarian-specific: area/region) — new term
        - vármegye             # (Historical/official Hungarian term for county) — new term


    - name: GPS_COORDINATES
      regex: '\s*([-]?((90(\.0{4,6})?)|([1-8]?\d(\.\d{4,6})?)))°?\s*([NS]?)\s*,\s*([-]?((180(\.0{4,6})?)|([1]{0,1}[0-7]?[0-9](\.\d{4,6})?)))°?\s*([EW]?)\s*'
      confidence: 0.9
      keywords:
        - koordináták          # coordinates, Koordinaten, coordonnées, coordenadas
        - helymeghatározás     # geolocation, emplacement, ubicación
        - gps                  # gps
        - szélességi fok       # latitude, Breitengrad, latitude, latitud
        - hosszúsági fok       # longitude, Längengrad, longitude, longitud
        - aktuális helyzet     # current location (English)
        - pozíció              # (Hungarian-specific) position — commonly used in GPS context

    - name: BIG_NUMBERS
      regex: '[0-9]{11,}'
      confidence: 0.5
      keywords: []

    - name: BIG_NUMBERS
      regex: '(?i)((?:(?:egy|kettő|három|négy|öt|hat|hét|nyolc|kilenc|nulla)(?: |,)*){6,})'
      confidence: 0.5
      keywords:
        - egy        # eins
        - kettő      # zwei
        - három      # drei
        - négy       # vier
        - öt         # fünf
        - hat        # sechs
        - hét        # sieben
        - nyolc      # acht
        - kilenc     # neun
        - nulla      # null


    # Date time related patterns

    - name: DATE
      regex: '(?<=\s|\.)(?i)\b([1-9]|[0-2]\d|3[0-1])[\. -]([1-9]|0[1-9]|1[0-2])[\.
        -](19|20)?\d\d\b(?=\s|\.)'
      confidence: 0.5
      keywords:
        - dátum             # date, Datum, fecha, ημερομηνία
        - születésnap       # birthday, Geburtstag, cumpleaños
        - született         # born, geboren, nacido, γεννήθηκε, rođen, rođena
        - évforduló         # anniversary, Jahrestag, aniversario, επετειός
        - kor               # dob (Serbo-Croatian), dobi
        - ünnepelte         # proslavio, proslavila (celebrated)
        - rokonok szülinapja  # rođendan (birthday) – new Hungarian term, "relative's birthday"
        - betöltötte        # napunio, napunila (turned/filled age)
        - májusban          # svibnja (in May)
        - januárban         # siječnju (in January)
