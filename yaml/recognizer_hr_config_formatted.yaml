#phone_recognizer
phone_recognizer:
  custom_phonenumber:
    - name: "Croatian International Mobile or Landline"
      regex: '(?:\+385|00385)(?:9[125789]\d{7}|(?:1|20|21|22|23|31|32|33|34|35|40|42|43|44|47|48|49|51|52|53)\d{6,7})'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber

      # Matches national mobile numbers starting with 091–099
    - name: "Croatian National Mobile Number"
      regex: '\b09[125789]\d{7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber

      # Matches national landline numbers with valid Croatian area codes
    - name: "Croatian National Landline Number"
      regex: '\b0(?:1|20|21|22|23|31|32|33|34|35|40|42|43|44|47|48|49|51|52|53)\d{6,7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber

      # Matches Croatian toll-free numbers starting with 0800 (national or international)
    - name: "Croatian Toll-Free Number"
      regex: '(?:\+385|00385|0)?800\d{6}\b'
      confidence: 0.6
      keywords: *shared_keywords_phonenumber


