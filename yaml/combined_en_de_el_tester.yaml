usssn_recognizer:
  custom_usssn:
    - name: "US SSN1 (weak)"
      regex: '\b([0-9]{5})[-.\s]([0-9]{4})\b'
      confidence: 0.3
      keywords: *shared_keywords_usssn

    - name: "US SSN2 (weak)"
      regex: '\b([0-9]{3})[-.\s]([0-9]{6})\b'
      confidence: 0.3
      keywords: *shared_keywords_usssn

    - name: "US SSN3 (weak)"
      regex: '\b(([0-9]{3})[-.\s]([0-9]{2})[-.\s]([0-9]{4}))\b'
      confidence: 0.4
      keywords: *shared_keywords_usssn

    - name: "US SSN4 (weak)"
      regex: '\b[0-9]{9}\b'
      confidence: 0.2
      keywords: *shared_keywords_usssn

    - name: "US SSN6 (weak)"
      regex: '\b[0-9]([\—\- ._]*[0-9]){8}\b'
      confidence: 0.3
      keywords: *shared_keywords_usssn

    - name: "US SSN5 (medium)"
      regex: '\b([0-9]{3})[- .]*([0-9]{2})[- .]*([0-9]{4})\b'
      confidence: 0.5
      keywords: *shared_keywords_usssn

    - name: "US SSN7 (high)"
      regex: '\b(?!(000|666|9))\d{3}-(?!00)\d{2}-(?!0000)\d{4}\b'
      confidence: 0.8
      keywords: *shared_keywords_usssn

    - name: "US SSN8 (OCR)"
      regex: '(?<!\w)\b[\dlZEASBO]{3} [\dlZEASBO]{2} [\dlZEASBO]{4}|([\dlZEASBO] ?){3}[\—\-_]
        ?([\dlZEASBO] ?){2}[\—\-_] ?([\dlZEASBO] ?){4}\b'
      confidence: 0.5
      keywords: *shared_keywords_usssn

