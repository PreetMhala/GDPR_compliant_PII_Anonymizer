#credit_card_recognizer
credit_card_recognizer:
  custom_credit_card:
    - name: "Visa/Mastercard/Amex Card"
      regex: '\b((4\d{3}|5[1-5]\d{2}|2\d{3}|3[47]\d{1,2})[\s\-]?\d{4,6}[\s\-]?\d{4,6}?([\s\-]\d{3,4})?(\d{3})?)\b'
      confidence: 0.3
      keywords: *shared_keywords_credit_card

    - name: "Amex Card"
      regex: '\b3[47][0-9]{13}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "BCGlobal"
      regex: '\b(6541|6556)[0-9]{12}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Carte Blanche Card"
      regex: '\b389[0-9]{11}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Diners Club Card"
      regex: '\b3(?:0[0-5]|[68][0-9])[0-9]{11}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Discover Card"
      regex: '\b65[4-9][0-9]{13}|64[4-9][0-9]{13}|6011[0-9]{12}|(622(?:12[6-9]|1[3-9][0-9]|[2-8][0-9][0-9]|9[01][0-9]|92[0-5])[0-9]{10})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Insta Payment Card"
      regex: '\b63[7-9][0-9]{13}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "JCB Card"
      regex: '\b(?:2131|1800|35\d{3})\d{11}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Korean Local Card"
      regex: '\b9[0-9]{15}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Maestro Card"
      regex: '\b(5018|5020|5038|6304|6759|6761|6763)[0-9]{8,15}\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "MasterCard"
      regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|[25][1-7][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|(?:2131|1800|35\d{3})\d{11})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Union Pay Card"
      regex: '\b(62[0-9]{14,17})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Visa Card"
      regex: '\b4[0-9]{12}(?:[0-9]{3})?\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "Visa Master Card"
      regex: '\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14})\b'
      confidence: 0.2
      keywords: *shared_keywords_credit_card

    - name: "All Credit Cards (weak)"
      regex: '\b((4\d{3})|(5[0-5]\d{2})|(6\d{3})|(1\d{3})|(3\d{3}))[- ]?(\d{3,4})[-
        ]?(\d{3,4})[- ]?(\d{3,5})\b'
      confidence: 0.3
      keywords: *shared_keywords_credit_card
    - name: "All Credit Cards"
      regex: '\b(?:4\d{3}|5[1-5]\d{2}|2\d{3}|3[47]\d{1,2})[\s\-]?\d{4}[\s\-]?\d{4}[\s\-]?\d{1,4}\b'
      confidence: 0.3
      keywords: *shared_keywords_credit_card

  
#email_recognizer
email_recognizer:
  custom_email:
    - name: "Email Address (Monster)"
      regex: '(?i)\b(?:[a-z0-9!#$%&''*+/=?^_`{|}~-]+(?:\.[a-z0-9!#$%&''*+/=?^_`{|}~-]+)*|"(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21\x23-\x5b\x5d-\x7f]|\\[\x01-\x09\x0b\x0c\x0e-\x7f])*")@(?:(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?|\[(?:(?:(2(5[0-5]|[0-4][0-9])|1[0-9][0-9]|[1-9]?[0-9]))\.){3}(?:(2(5[0-5]|[0-4][0-9])|1[0-9][0-9]|[1-9]?[0-9])|[a-z0-9-]*[a-z0-9]:(?:[\x01-\x08\x0b\x0c\x0e-\x1f\x21-\x5a\x53-\x7f]|\\[\x01-\x09\x0b\x0c\x0e-\x7f])+)\])\b'
      confidence: 0.4
      keywords: *shared_keywords_email
    - name: "Email Address (Definite)"
      regex: '(?i)\b([\w\d._%+-]+@[\w\d._%+-]+(\.[\w\d]+)+)\b'
      confidence: 0.95
      keywords: *shared_keywords_email
    - name: "Email Address (Common Regex)"
      regex: '(?i)([a-z0-9!#$%&''*+\/=?^_`{|.}~-]+@(?:[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z0-9](?:[a-z0-9-]*[a-z0-9])?)'
      confidence: 0.8
      keywords: *shared_keywords_email
    - name: "Email Address (Extended)"
      regex: '(?i)([a-z0-9!#$%&''*+/?^_`{|}~-]+(?:\.[a-z0-9!#$%&''*+/?^_`{|}~-]+)*)(\+[\w-]*)?@([a-z0-9-]+\.[a-z]{2,})(?:\.[a-z]{2,})?'
      confidence: 0.9
      keywords: *shared_keywords_email

