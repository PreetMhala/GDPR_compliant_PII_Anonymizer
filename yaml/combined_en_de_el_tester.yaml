# numerical placeholder
phone_recognizer:
  custom_phonenumber:
    - name: "Phone Number (Formatted)"
      regex: '(?<![\d+])(?i)\b\+(?:[1-9]\d{,2})(?:[^\w\d]*\d){6,14}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber

    - name: "Phone Number (unformatted)"
      regex: '(?i)(?<![\d+])\b((\+\s*[1-9](?:[\s._-]*\d){,2}([\s._-]*[1-9](?:[\s._-]*\d){1,4})\([\s._-]*[1-9](?:[\s._-]*\d){2,6})([\s._-]*\-(?:[\s._-]*\d){1,5})?)|(?:[0+][\s._-]*\d(?:[\s._-]*\d){,2})?(?:[\s._-]*\d){6,16}\b'
      confidence: 0.5
      keywords: *shared_keywords_phonenumber

    - name: "Phone Number (US Format)"
      regex: '(?i)(?<![\d+])\b(?:\+\d{,2})?(?:\(\d{3}\)|\d{3})[-.\s]?\d{3}[-.\s]?\d{4}\b'
      confidence: 0.9
      keywords: *shared_keywords_phonenumber

    - name: "Phone Number (Common Regex)"
      regex: '(?<![\d+])\b((?:(?:\+?\d{1,3}[-.\s*]?)?(?:\(?\d{3}\)?[-.\s*]?)?\d{3}[-.\s*]?\d{4}(?![\d-]))|(?:(?<![\d-])(?:(?:\(\+?\d{2}\))|(?:\+?\d{2}))[\s._-]*\d{2}[\s._-]*\d{3}[\s._-]*\d{4}(?![\d-])))\b'
      confidence: 0.5
      keywords: *shared_keywords_phonenumber

    - name: "Phone Number (Common Regex with extensions)"
      regex: '(?<![\d+])\b((?:(?:\+?1[\s._-]*(?:[-.\s]*)?)?(?:\([\s._-]*(?:[2-9]1[02-9]|[2-9][02-8]1|[2-9][02-8][02-9])[\s._-]*\)|(?:[2-9]1[02-9]|[2-9][02-8]1|[2-9][02-8][02-9]))[\s._-]*(?:[.-]\s*)?)?(?:[2-9]1[02-9]|[2-9][02-9]1|[2-9][02-9]{2})[\s._-]*(?:[-.\s]*)?(?:[0-9]{4})(?:[\s._-]*(?:#|x\.?|ext\.?|extension)[\s._-]*(?:\d+)?))\b'
      confidence: 0.5
      keywords: *shared_keywords_phonenumber

    - name: "French Phone Number"
      regex: '\b(0?11)?330?\d{9}\b'
      confidence: 0.3
      keywords: *shared_keywords_phonenumber

    - name: "German Phone Number"
      regex: '\b(0?11)?330?\d{9}\b'
      confidence: 0.3
      keywords: *shared_keywords_phonenumber
    - name: "Greek International Mobile Number"
      regex: '(?:\+30|0030)(?:693|694|695|697|698|699)\d{7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber
    - name: "Greek National Mobile Number"
      regex: '\b(?:693|694|695|697|698|699)\d{7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber
    - name: "Greek International Landline Number"
      regex: '(?:\+30|0030)(?:210|231|241|251|261|271|281|231|241|271|281|231|241|231)\d{7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber
    - name: "Greek National Landline Number"
      regex: '\b(?:210|231|241|251|261|271|281|231|241|271|281|231|241|231)\d{7}\b'
      confidence: 0.7
      keywords: *shared_keywords_phonenumber
    - name: "Greek Toll-Free Number"
      regex: '(?:\+30|0030|0)?80[01]\d{6,7}\b'
      confidence: 0.6
      keywords: *shared_keywords_phonenumber
    - name: "Greek Premium or Shared-Cost Number"
      regex: '(?:\+30|0030|0)?80[6-9]\d{6,7}\b'
      confidence: 0.5
      keywords: *shared_keywords_phonenumber

#usssn_recognizer
ssn_recognizer:
  custom_ssn:
    - name: "France SSN (weak)"
      regex: '\b\d{13}|\d{13}\s\d{2}\b'
      confidence: 0.3
      keywords: *shared_keywords_ssn

    - name: "Spain SSN (weak)"
      regex: '\b\d{2}\/?\d{8}\/?\d{2}\b'
      confidence: 0.3
      keywords: *shared_keywords_ssn

    - name: "German SSN1 (weak)"
      regex: '(?i:\b[0-9]{2}[0-3][0-9][0-1][0-9]{3}[A-Z][0-9]{3}\b)'
      confidence: 0.3
      keywords: *shared_keywords_ssn

    - name: "German SSN2 (high)"
      regex: '(?i:\b[0-9]{2}[\s.-]?[0-3][0-9][\s.-]?[0-1][0-9][\s.-]?[0-9]{2}[\s.-]?[A-Z][\s.-]?[0-9]{2}[\s.-]?[0-9]\b)'
      confidence: 0.8
      keywords: *shared_keywords_ssn
    - name: "Greece SSN"
      regex: '\b\d{2}(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])\d{5}\b'
      confidence: 0.8
      keywords: *shared_keywords_ssn



