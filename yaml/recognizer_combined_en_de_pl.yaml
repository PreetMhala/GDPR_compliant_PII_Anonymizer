    - name: "Phone Number (unformatted)"
      regex: '(?i)(?<![\d+])\b((\+\s*[1-9](?:[\s._-]*\d){,2}([\s._-]*[1-9](?:[\s._-]*\d){1,4})\([\s._-]*[1-9](?:[\s._-]*\d){2,6})([\s._-]*\-(?:[\s._-]*\d){1,5})?)|(?:[0+][\s._-]*\d(?:[\s._-]*\d){,2})?(?:[\s._-]*\d){6,16}\b'
