network_address_recognizers:
  custom_network_address:
    - name: "IPv4 Address"
      regex: '\b(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b'
      confidence: 0.9
      keywords: &shared_keywords_network_address
        - 'ip'                       # ip
        - 'internet'                 # internet
        - 'adres'                    # address, host address, mac address
        - 'host'                     # host
        - 'sieć'                     # network
        - 'ipv4'                     # ipv4
        - 'ipv6'                     # ipv6
        - 'urządzenie'               # device
        - 'serwer'                   # server
        - 'podsieć'                  # subnet
        - 'router'                   # router
        - 'brama'                    # gateway
        - 'lokalny'                  # local
        - 'publiczny'                # public
        - 'prywatny'                 # private
        - 'mac'                      # mac
        - 'ethernet'                 # ethernet


    - name: "IPv6 Address (Uncompressed)"
      regex: '\b([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}\b'
      confidence: 0.9
      keywords: *shared_keywords_network_address

    - name: "IPv6 Address (Compressed)"
      regex: '\b([0-9a-fA-F]{1,4}:){1,7}:|:([0-9a-fA-F]{1,4}:){1,7}\b'
      confidence: 0.85
      keywords: *shared_keywords_network_address

    - name: "MAC Address (Colon-separated)"
      regex: '\b([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}\b'
      confidence: 0.9
      keywords: *shared_keywords_network_address

    - name: "MAC Address (Hyphen-separated)"
      regex: '\b([0-9a-fA-F]{2}-){5}[0-9a-fA-F]{2}\b'
      confidence: 0.9
      keywords: *shared_keywords_network_address

    - name: "MAC Address (No separator)"
      regex: '\b[0-9a-fA-F]{12}\b'
      confidence: 0.8
      keywords: *shared_keywords_network_address

