    - name: "Phone Number (US Format)"
      regex: '(?i)(?<![\d+])\b(?:\+\d{,2})?(?:\(\d{3}\)|\d{3})[-.\s]?\d{3}[-.\s]?\d{4}\b'
      confidence: 0.9

    - name: "Phone Number (Common Regex)"
      regex: '(?<![\d+])\b((?:(?:\+?\d{1,3}[-.\s*]?)?(?:\(?\d{3}\)?[-.\s*]?)?\d{3}[-.\s*]?\d{4}(?![\d-]))|(?:(?<![\d-])(?:(?:\(\+?\d{2}\))|(?:\+?\d{2}))[\s._-]*\d{2}[\s._-]*\d{3}[\s._-]*\d{4}(?![\d-])))\b'
      confidence: 0.5

    - name: "Phone Number (Common Regex with extensions)"
      regex: '(?<![\d+])\b((?:(?:\+?1[\s._-]*(?:[-.\s]*)?)?(?:\([\s._-]*(?:[2-9]1[02-9]|[2-9][02-8]1|[2-9][02-8][02-9])[\s._-]*\)|(?:[2-9]1[02-9]|[2-9][02-8]1|[2-9][02-8][02-9]))[\s._-]*(?:[.-]\s*)?)?(?:[2-9]1[02-9]|[2-9][02-9]1|[2-9][02-9]{2})[\s._-]*(?:[-.\s]*)?(?:[0-9]{4})(?:[\s._-]*(?:#|x\.?|ext\.?|extension)[\s._-]*(?:\d+)?))\b'
      confidence: 0.5

    - name: "French Phone Number"
      regex: '\b(0?11)?330?\d{9}\b'
      confidence: 0.3

    - name: "German Phone Number"
      regex: '\b(0?11)?330?\d{9}\b'
      confidence: 0.3

